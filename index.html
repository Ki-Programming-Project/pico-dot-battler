// BATTLE
// ================================================
const Battle = {
  isActive: false,
  playerCharId: null,
  _state: null,
  _timer: null,
  _speedIdx: 0,
  _canvas: null,
  _ctx: null,
  _stageOverlayTimer: null,
  _winStreak: 0,
  _battleCount: 0,

  start() {
    const char = Formation.getSelected();
    if (!char) { App.toast('キャラを選択してください', 'var(--accent)'); return; }
    this.playerCharId = char.id;
    this._battleCount++;
    this._speedIdx = 0;
    this.isActive = true;

    // ステージ選択
    const stage = BALANCE.stages[Utils.rand(0, BALANCE.stages.length - 1)];
    // 敵生成
    const enemy = this._generateEnemy(this._battleCount);
    // プレイヤーステータスにステージ補正
    const pStats = { ...char.stats };
    if (stage.bonusStat && stage.bonusVal) {
      pStats[stage.bonusStat] = Math.round(pStats[stage.bonusStat] * (1 + stage.bonusVal));
    }
    const eStats = { ...enemy.stats };
    if (stage.bonusStat && stage.bonusVal) {
      eStats[stage.bonusStat] = Math.round(eStats[stage.bonusStat] * (1 + stage.bonusVal));
    }

    this._state = {
      player: { ...char, stats: pStats, hp: pStats.hp, maxHp: pStats.hp, sp: 0, maxSp: 10, defBuff: 0, invincible: 0, evade: 0, allBuff: 0, nocost: 0, skills: Utils.getSkills(pStats), skillCd: [0,0,0], enhanced: false },
      enemy:  { ...enemy, stats: eStats, hp: eStats.hp, maxHp: eStats.hp, sp: 0, maxSp: 10, defBuff: 0, invincible: 0, evade: 0, allBuff: 0, nocost: 0, skills: Utils.getSkills(eStats), skillCd: [0,0,0], enhanced: false },
      stage, turn: 0, kills: 0, maxTurns: BALANCE.maxTurns,
      log: [], over: false, won: false,
    };

    App.showScreen('battle');
    // DOM確定後にCanvas初期化
    requestAnimationFrame(() => {
      this._initCanvas();
      this._renderBars();
      this._renderSkillBtns();
      this._renderLives();
      this._updateSpeedBtn();
      document.querySelectorAll('.tab-btn').forEach(t => t.classList.add('disabled'));
      this._showStageOverlay(stage);
    });
  },

  _generateEnemy(battleCount) {
    const strength = Math.min(1.0, battleCount / 20);
    const totalPixels = Math.round(50 + strength * 150);
    const colorCount = Math.round(2 + strength * 4);
    const availableColors = BALANCE.paletteColors.slice(0, Math.min(colorCount + 2, BALANCE.paletteColors.length));
    const pixels = Array(256).fill('transparent');
    // シンメトリー生成
    const half = 8;
    for (let row = 0; row < 16; row++) {
      for (let col = 0; col < half; col++) {
        if (Math.random() < strength * 0.7 + 0.1) {
          const color = availableColors[Utils.rand(0, availableColors.length - 1)].id;
          pixels[row * 16 + col] = color;
          pixels[row * 16 + (15 - col)] = color;
        }
      }
    }
    // 使用色が少ない場合は補完
    let filled = pixels.filter(c => c !== 'transparent').length;
    while (filled < totalPixels * 0.5) {
      const idx = Utils.rand(0, 255);
      if (pixels[idx] === 'transparent') {
        const color = availableColors[Utils.rand(0, availableColors.length - 1)].id;
        const mirrorIdx = Math.floor(idx / 16) * 16 + (15 - (idx % 16));
        pixels[idx] = color;
        pixels[mirrorIdx] = color;
        filled += 2;
      }
    }
    const stats = Utils.calcStats(pixels);
    const name = Utils.autoName(pixels);
    return {
      id: 'enemy_' + Date.now(),
      name: 'ENEMY:' + name,
      pixels, stats,
      level: Math.round(1 + strength * 15),
    };
  },

  _initCanvas() {
    this._canvas = document.getElementById('battle-canvas');
    const wrap = document.getElementById('battle-canvas-wrap');
    this._canvas.width = wrap.clientWidth;
    this._canvas.height = wrap.clientHeight;
    this._ctx = this._canvas.getContext('2d');
    this._drawBattle();
  },

  _drawBattle(opts = {}) {
    const ctx = this._ctx;
    const W = this._canvas.width, H = this._canvas.height;
    const state = this._state;
    ctx.clearRect(0, 0, W, H);

    // ステージ背景
    const bg = state.stage.bg;
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, bg[0]);
    grad.addColorStop(0.5, bg[1]);
    grad.addColorStop(1, bg[2]);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // キャラ表示サイズ・位置
    const charSize = Math.min(80, W * 0.3);
    const dotSize = Math.floor(charSize / 16);
    const actualSize = dotSize * 16;
    const yCenterRatio = 0.5;
    const yOffset = H * yCenterRatio - actualSize / 2;
    const idleOffset = Math.sin(Date.now() / 1000 * Math.PI) * 2;

    // 敵（左側）
    const eX = W * 0.25 - actualSize / 2 + (opts.enemySlide || 0);
    const eY = yOffset + idleOffset + (opts.enemyFall || 0);
    ctx.globalAlpha = opts.enemyOpacity !== undefined ? opts.enemyOpacity : 1;
    this._drawCharOnCtx(ctx, state.enemy.pixels, eX, eY, dotSize);

    // プレイヤー（右側）
    const pX = W * 0.75 - actualSize / 2 + (opts.playerSlide || 0);
    const pY = yOffset + idleOffset + (opts.playerFall || 0);
    ctx.globalAlpha = opts.playerOpacity !== undefined ? opts.playerOpacity : 1;
    this._drawCharOnCtx(ctx, state.player.pixels, pX, pY, dotSize);

    ctx.globalAlpha = 1;
  },

  _drawCharOnCtx(ctx, pixels, x, y, dotSize) {
    for (let i = 0; i < 256; i++) {
      const c = pixels[i];
      if (!c || c === 'transparent') continue;
      const pc = BALANCE.paletteColors.find(p => p.id === c);
      if (!pc) continue;
      const px = x + (i % 16) * dotSize;
      const py = y + Math.floor(i / 16) * dotSize;
      ctx.fillStyle = pc.hex;
      ctx.fillRect(px, py, dotSize, dotSize);
    }
  },

  _showStageOverlay(stage) {
    const overlay = document.getElementById('stage-overlay');
    overlay.style.display = 'flex';
    document.getElementById('stage-name-text').textContent = stage.name;
    document.getElementById('stage-bonus-text').textContent = stage.bonus;
    document.getElementById('stage-gimmick-text').textContent = stage.gimmick !== 'なし' ? `ギミック: ${stage.gimmick}` : '';
    overlay.style.display = 'flex';
    this._stageOverlayTimer = setTimeout(() => this._hideStageOverlay(), 3000);
  },

  skipStageOverlay() {
    clearTimeout(this._stageOverlayTimer);
    this._hideStageOverlay();
  },

  _hideStageOverlay() {
    document.getElementById('stage-overlay').style.display = 'none';
    this._startLoop();
  },

  _startLoop() {
    if (this._timer) clearInterval(this._timer);
    this._tick();
    this._timer = setInterval(() => this._tick(), 1000 / BALANCE.speedSteps[this._speedIdx]);
  },

  _stopLoop() {
    if (this._timer) { clearInterval(this._timer); this._timer = null; }
  },

  _tick() {
    const state = this._state;
    if (state.over) return;
    state.turn++;

    // ステージギミック
    const stage = state.stage;
    if (stage.gimmickInterval > 0 && state.turn % stage.gimmickInterval === 0) {
      if (stage.id === 'cave') {
        state.player.hp = Math.max(0, state.player.hp - stage.gimmickDmg);
        state.enemy.hp  = Math.max(0, state.enemy.hp - stage.gimmickDmg);
        this._showEffect('岩落下！', '#888', 'center');
      } else if (stage.id === 'beach') {
        state.player.sp = Math.min(state.player.maxSp, state.player.sp + 2);
        state.enemy.sp  = Math.min(state.enemy.maxSp,  state.enemy.sp + 2);
        this._showEffect('波！SP+', '#60a5fa', 'center');
      } else if (stage.id === 'volcano') {
        state.player.hp = Math.max(0, state.player.hp - stage.gimmickDmg);
        state.enemy.hp  = Math.max(0, state.enemy.hp - stage.gimmickDmg);
        this._showEffect('噴火！', '#f5a623', 'center');
      }
    }

    // SP回復
    const pSpRec = Math.max(1, Math.round(state.player.stats.sp / 20));
    const eSpRec = Math.max(1, Math.round(state.enemy.stats.sp / 20));
    state.player.sp = Math.min(state.player.maxSp, state.player.sp + pSpRec);
    state.enemy.sp  = Math.min(state.enemy.maxSp,  state.enemy.sp + eSpRec);

    // クールダウン
    state.player.skillCd = state.player.skillCd.map(cd => Math.max(0, cd - 1));
    state.enemy.skillCd  = state.enemy.skillCd.map(cd => Math.max(0, cd - 1));

    // バフターン減少
    ['defBuff','invincible','evade','allBuff','nocost'].forEach(k => {
      if (state.player[k] > 0) state.player[k]--;
      if (state.enemy[k] > 0) state.enemy[k]--;
    });

    // HP30%以下強化
    if (!state.enemy.enhanced && state.enemy.hp < state.enemy.maxHp * 0.3) {
      state.enemy.enhanced = true;
      state.enemy.stats = { ...state.enemy.stats, atk: Math.round(state.enemy.stats.atk * 1.5) };
      this._showEffect('敵が強化！', '#e94560', 'left');
    }

    // 先攻決定
    const playerFirst = state.player.stats.spd >= state.enemy.stats.spd;

    // 敵AIスキル判断
    const enemySkillIdx = this._enemySkillDecide(state);

    if (playerFirst) {
      this._doAttack(state.player, state.enemy, null, false);
      if (state.enemy.hp > 0) {
        if (enemySkillIdx >= 0) this._doSkill(state.enemy, state.player, enemySkillIdx, true);
        else this._doAttack(state.enemy, state.player, null, true);
      }
    } else {
      if (enemySkillIdx >= 0) this._doSkill(state.enemy, state.player, enemySkillIdx, true);
      else this._doAttack(state.enemy, state.player, null, true);
      if (state.player.hp > 0) this._doAttack(state.player, state.enemy, null, false);
    }

    // ターン上限
    if (state.turn >= state.maxTurns && !state.over) {
      const pWin = state.player.hp >= state.enemy.hp;
      this._endBattle(pWin ? 'win' : 'lose');
      return;
    }

    // HP0チェック
    if (state.enemy.hp <= 0 && !state.over) {
      state.kills++;
      const nextEnemy = this._generateEnemy(this._battleCount + state.kills);
      const eStats = { ...nextEnemy.stats };
      if (stage.bonusStat && stage.bonusVal) {
        eStats[stage.bonusStat] = Math.round(eStats[stage.bonusStat] * (1 + stage.bonusVal));
      }
      state.enemy = {
        ...nextEnemy,
        stats: eStats,
        hp: eStats.hp, maxHp: eStats.hp,
        sp: 0, maxSp: 10,
        defBuff: 0, invincible: 0, evade: 0, allBuff: 0, nocost: 0,
        skills: Utils.getSkills(eStats),
        skillCd: [0, 0, 0],
        enhanced: false,
      };
      this._renderBars();
      Audio.play('victory');
    }
    if (state.player.hp <= 0 && !state.over) {
      this._loseLife();
      return;
    }

    this._drawBattle();
    this._renderBars();
    this._renderSkillBtns();
    this._renderLives();
    document.getElementById('turn-counter').textContent = 'T:' + state.turn;
  },

  _enemySkillDecide(state) {
    const enemy = state.enemy;
    for (let i = 2; i >= 0; i--) {
      if (!enemy.skills[i]) continue;
      const sk = enemy.skills[i];
      if (enemy.sp < sk.spCost) continue;
      if (enemy.skillCd[i] > 0) continue;
      if (Math.random() < 0.25) return i;
    }
    return -1;
  },

  _doAttack(attacker, defender, mult, isEnemy) {
    if (defender.invincible > 0) {
      this._showEffect('無敵！', '#ffd700', isEnemy ? 'right' : 'left');
      return;
    }
    if (defender.evade > 0 && Math.random() < 0.4) {
      this._showEffect('回避！', '#a8e063', isEnemy ? 'right' : 'left');
      return;
    }
    const atkStat = attacker.allBuff > 0 ? attacker.stats.atk * 1.3 : attacker.stats.atk;
    const defStat = attacker === this._state.player ? 0 : (defender.defBuff > 0 ? defender.stats.def * 1.5 : defender.stats.def);
    const base = Math.max(1, atkStat * (mult || 1) - defStat * BALANCE.defReduction);
    const variance = 1 + (Math.random() * 2 - 1) * BALANCE.dmgVariance;
    const spdDiff = Math.abs(attacker.stats.spd - defender.stats.spd);
    const critRate = Math.min(BALANCE.critMaxRate, spdDiff / 100);
    const isCrit = Math.random() < critRate;
    const dmg = Math.max(1, Math.round(base * variance * (isCrit ? BALANCE.critMultiplier : 1)));
    defender.hp = Math.max(0, defender.hp - dmg);
    const color = isCrit ? '#ffd700' : (isEnemy ? '#e94560' : '#4ecdc4');
    this._showEffect((isCrit ? '💥' : '') + dmg, color, isEnemy ? 'right' : 'left');
    // カウンター処理
    if (defender.skills) {
      const counterIdx = defender.skills.findIndex(s => s && s.type === 'counter');
      if (counterIdx >= 0 && defender.skillCd[counterIdx] === 0 && Math.random() < 0.3) {
        const cDmg = Math.round(dmg * 0.5);
        attacker.hp = Math.max(0, attacker.hp - cDmg);
        this._showEffect('反撃! ' + cDmg, '#f5a623', isEnemy ? 'left' : 'right');
      }
    }
    Audio.play(isEnemy ? 'damage' : 'attack');
    this._slideAnim(isEnemy ? 'enemy' : 'player');
  },

  _doSkill(attacker, defender, skillIdx, isEnemy) {
    const sk = attacker.skills[skillIdx];
    if (!sk) return;
    if (attacker.nocost === 0) {
      if (attacker.sp < sk.spCost) return;
      attacker.sp -= sk.spCost;
    }
    attacker.skillCd[skillIdx] = sk.cooldown;

    const effectColor = sk.type === 'atk' || sk.type === 'drain' || sk.type === 'double' ? (isEnemy ? '#8b0000' : '#e94560')
      : sk.type === 'heal' || sk.type === 'fullheal' ? (isEnemy ? '#145214' : '#4ecdc4')
      : (isEnemy ? '#856400' : '#f5a623');

    switch(sk.type) {
      case 'atk':
        if (sk.hits) {
          for (let h = 0; h < sk.hits; h++) this._doAttack(attacker, defender, sk.mult, isEnemy);
        } else {
          this._doAttack(attacker, defender, sk.mult, isEnemy);
        }
        break;
      case 'heal':
        attacker.hp = Math.min(attacker.maxHp, attacker.hp + Math.round(attacker.maxHp * sk.rate));
        this._showEffect('回復!', '#4ecdc4', isEnemy ? 'left' : 'right');
        break;
      case 'fullheal':
        attacker.hp = attacker.maxHp;
        this._showEffect('完全回復!', '#4ecdc4', isEnemy ? 'left' : 'right');
        break;
      case 'drain':
        const drainDmg = Math.max(1, Math.round(attacker.stats.atk * sk.mult - defender.stats.def * BALANCE.defReduction));
        defender.hp = Math.max(0, defender.hp - drainDmg);
        attacker.hp = Math.min(attacker.maxHp, attacker.hp + Math.round(drainDmg * 0.5));
        this._showEffect('吸収!' + drainDmg, '#a855f7', isEnemy ? 'right' : 'left');
        break;
      case 'def':
        attacker.defBuff = sk.turns;
        this._showEffect('防御↑', '#3a7bd5', isEnemy ? 'left' : 'right');
        break;
      case 'invincible':
        attacker.invincible = sk.turns;
        this._showEffect('無敵!', '#ffd700', isEnemy ? 'left' : 'right');
        break;
      case 'evade':
        attacker.evade = sk.turns;
        this._showEffect('回避↑', '#a8e063', isEnemy ? 'left' : 'right');
        break;
      case 'double':
        this._doAttack(attacker, defender, 1, isEnemy);
        this._doAttack(attacker, defender, 1, isEnemy);
        break;
      case 'spfull':
        attacker.sp = attacker.maxSp;
        this._showEffect('SP↑↑', '#f5a623', isEnemy ? 'left' : 'right');
        break;
      case 'allbuff':
        attacker.allBuff = sk.turns;
        this._showEffect('全能力↑', '#ffd700', isEnemy ? 'left' : 'right');
        break;
      case 'nocost':
        attacker.nocost = sk.turns;
        this._showEffect('SP無消費!', '#f5a623', isEnemy ? 'left' : 'right');
        break;
    }
    this._flash(effectColor);
    Audio.play('skill');
  },

  _loseLife() {
    const chars = Storage.getChars();
    const char = chars.find(c => c.id === this.playerCharId);
    if (char) {
      if (char._battleLives === undefined) char._battleLives = BALANCE.lifeCount;
      char._battleLives--;
      Storage.saveChars(chars);
      if (char._battleLives <= 0) {
        char._battleLives = 0;
        this._playDefeatAnim(() => this._endBattle('lose'));
        return;
      }
    }
    this._playDefeatAnim(() => {
      this._state.player.hp = this._state.player.maxHp;
      this._renderBars();
      this._renderLives();
      Audio.play('damage');
      App.toast('残機−1！', 'var(--accent)');
    });
  },

  // 敗北演出：プレイヤーキャラが落下→コールバック
  _playDefeatAnim(cb) {
    this._stopLoop();
    const duration = 500; // ms
    const start = performance.now();
    const animate = (now) => {
      const elapsed = now - start;
      const progress = Math.min(1, elapsed / duration);
      const fallY = progress * 80;
      const opacity = 1 - progress;
      this._drawBattle({ playerFall: fallY, playerOpacity: opacity });
      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        Audio.play('defeat');
        setTimeout(cb, 300);
      }
    };
    requestAnimationFrame(animate);
  },

  _endBattle(result) {
    this._stopLoop();
    this._state.over = true;
    this._state.won = result === 'win';
    this.isActive = false;

    // タブバー戻す
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('disabled'));

    const chars = Storage.getChars();
    const char = chars.find(c => c.id === this.playerCharId);
    let drops = [];
    let expGain = 0;
    let leveled = false;

    if (char) {
      char._battleLives = BALANCE.lifeCount; // リセット

      // EXP
      expGain = Utils.calcExp(this._state.enemy.stats, this._battleCount);
      char.exp = (char.exp || 0) + expGain;
      while (char.exp >= Utils.expToLevel(char.level) && char.level < BALANCE.maxLevel) {
        char.exp -= Utils.expToLevel(char.level);
        char.level++;
        leveled = true;
        // スキル解放チェック
        BALANCE.skillUnlockLv.forEach((lv, i) => {
          if (char.level >= lv && !char.unlockedSkills.includes(i)) {
            char.unlockedSkills.push(i);
            App.toast(`スキル${i+1}解放！`, 'var(--accent2)');
          }
        });
      }
      // Lv50上限→ポイント変換
      if (char.level >= BALANCE.maxLevel && char.exp > 0) {
        const shopData = Storage.getShop();
        const pts = Math.floor(char.exp / 10);
        shopData.points = Math.min(BALANCE.maxPoints, shopData.points + pts);
        Storage.saveShop(shopData);
        char.exp = char.exp % 10;
        if (pts > 0) App.toast(`Lv上限！${pts}pt獲得`, 'var(--accent2)');
      }

      // ドロップ
      if (result === 'win' && Math.random() < 0.25) {
        const drop = this._generateEquip();
        const shopData = Storage.getShop();
        if (!shopData.equipStock) shopData.equipStock = [];
        shopData.equipStock.push(drop);
        Storage.saveShop(shopData);
        drops.push(drop);
        App.toast(`装備入手: ${drop.name}！`, 'var(--rare-color)');
      }

      Storage.saveChars(chars);
    }

    // 連勝更新
    if (result === 'win') this._winStreak++;
    else { this._winStreak = 0; }

    // スコア計算
    const hpRate = Math.round((this._state.player.hp / this._state.player.maxHp) * 100);
    const score = Utils.calcScore(this._state.kills, hpRate, this._state.turn, this._winStreak);

    // ランキング登録（勝敗問わず撃破数1以上）
    if (score > 0 && this._state.kills > 0) this._saveRanking(score, char);

    // リザルト表示
    setTimeout(() => {
      this._showResult(result, score, expGain, drops, leveled);
      if (leveled) Audio.play('levelup');
    }, result === 'win' ? 1500 : 800);

    Audio.play(result === 'win' ? 'victory' : 'defeat');
  },

  _saveRanking(score, char) {
    const ranking = Storage.getRanking();
    ranking.push({
      score, charName: char ? char.name : '?',
      pixels: char ? char.pixels : null,
      kills: this._state.kills,
      turns: this._state.turn,
      winStreak: this._winStreak,
      date: Date.now(),
    });
    ranking.sort((a, b) => b.score - a.score);
    if (ranking.length > 10) ranking.length = 10;
    Storage.saveRanking(ranking);
  },

  _showResult(result, score, exp, drops, leveled) {
    const titleEl = document.getElementById('result-title');
    titleEl.textContent = result === 'win' ? '🎉 VICTORY!' : '💀 DEFEAT...';
    titleEl.className = 'result-title ' + (result === 'win' ? 'win' : 'lose');

    const scoreEl = document.getElementById('result-score-val');
    scoreEl.textContent = score.toLocaleString();

    // キャラドット絵
    const chars = Storage.getChars();
    const char = chars.find(c => c.id === this.playerCharId);
    if (char) {
      const canvas = document.getElementById('result-char-canvas');
      Utils.drawPixels(canvas.getContext('2d'), char.pixels, 4, 16, 16);
    }

    // 統計
    const statsEl = document.getElementById('result-stats');
    statsEl.innerHTML = `
      <div class="result-stat-row"><span class="label">撃破数</span><span class="val">${this._state.kills}</span></div>
      <div class="result-stat-row"><span class="label">経過ターン</span><span class="val">${this._state.turn}</span></div>
      <div class="result-stat-row"><span class="label">獲得EXP</span><span class="val">+${exp}</span></div>
      <div class="result-stat-row"><span class="label">連勝数</span><span class="val">${this._winStreak}</span></div>
      ${char ? `<div class="result-stat-row"><span class="label">${char.name} LV</span><span class="val">${char.level}${leveled?'（UP！）':''}</span></div>` : ''}
    `;

    // ドロップ
    const dropsEl = document.getElementById('result-drops');
    if (drops.length > 0) {
      dropsEl.innerHTML = '<div class="section-title">ドロップ品</div><div class="drop-list">' +
        drops.map(d => `<div class="drop-item" style="border-color:${d.rarity==='ultra'?'var(--ultra-color)':d.rarity==='rare'?'var(--rare-color)':'var(--normal-color)'}">${d.name}</div>`).join('') +
        '</div>';
    } else {
      dropsEl.innerHTML = '';
    }

    App.showScreen('result');
  },

  _generateEquip() {
    const rnd = Math.random();
    const rarity = rnd < 0.1 ? 'ultra' : rnd < 0.4 ? 'rare' : 'normal';
    const stats = ['atk','def','hp','spd','sp'];
    const stat = stats[Utils.rand(0, stats.length - 1)];
    const slotKeys = ['weapon','armor','accessory'];
    const slot = slotKeys[Utils.rand(0, slotKeys.length - 1)];
    const slotNames = { weapon: '⚔', armor: '🛡', accessory: '💍' };
    const statNames = { atk:'ATK', def:'DEF', hp:'HP', spd:'SPD', sp:'SP回復' };

    let name, effect;
    if (rarity === 'ultra') {
      const flat = Utils.rand(8, 15);
      const pct = Utils.rand(3, 8);
      name = `${slotNames[slot]}輝${statNames[stat]}装備`;
      effect = `${statNames[stat]}+${flat}かつ+${pct}%`;
    } else if (rarity === 'rare') {
      const pct = Utils.rand(5, 12);
      name = `${slotNames[slot]}強化${statNames[stat]}装備`;
      effect = `${statNames[stat]}+${pct}%`;
    } else {
      const flat = Utils.rand(5, 12);
      name = `${slotNames[slot]}${statNames[stat]}装備`;
      effect = `${statNames[stat]}+${flat}`;
    }
    return { name, effect, rarity, slot, enhancement: 0 };
  },

  activateSkill(idx) {
    const state = this._state;
    if (!state || state.over) return;
    const player = state.player;
    const sk = player.skills[idx];
    if (!sk) return;
    const char = Storage.getChars().find(c => c.id === this.playerCharId);
    if (!char || char.level < BALANCE.skillUnlockLv[idx]) return;
    if (player.skillCd[idx] > 0) return;
    if (player.sp < sk.spCost && player.nocost === 0) return;
    this._doSkill(player, state.enemy, idx, false);
    this._renderBars();
    this._renderSkillBtns();
  },

  _renderBars() {
    const s = this._state;
    if (!s) return;
    const pHp = Math.max(0, s.player.hp / s.player.maxHp * 100).toFixed(1);
    const eHp = Math.max(0, s.enemy.hp / s.enemy.maxHp * 100).toFixed(1);
    const pSp = Math.max(0, s.player.sp / s.player.maxSp * 100).toFixed(1);
    const eSp = Math.max(0, s.enemy.sp / s.enemy.maxSp * 100).toFixed(1);
    document.getElementById('player-hp-bar').style.width = pHp + '%';
    document.getElementById('enemy-hp-bar').style.width = eHp + '%';
    document.getElementById('player-sp-bar').style.width = pSp + '%';
    document.getElementById('enemy-sp-bar').style.width = eSp + '%';
    document.getElementById('player-hp-text').textContent = `${s.player.hp}/${s.player.maxHp}`;
    document.getElementById('enemy-hp-text').textContent = `${s.enemy.hp}/${s.enemy.maxHp}`;
    document.getElementById('player-name-label').textContent = s.player.name;
    document.getElementById('enemy-name-label').textContent = s.enemy.name;
  },

  _renderSkillBtns() {
    const s = this._state;
    if (!s) return;
    const el = document.getElementById('battle-skills');
    el.innerHTML = '';
    const char = Storage.getChars().find(c => c.id === this.playerCharId);
    for (let i = 0; i < 3; i++) {
      const sk = s.player.skills[i];
      const btn = document.createElement('div');
      btn.className = 'skill-btn';
      const unlocked = char && char.level >= BALANCE.skillUnlockLv[i];
      if (!sk || !unlocked) {
        btn.classList.add('locked-skill');
        const reqLv = BALANCE.skillUnlockLv[i];
        btn.innerHTML = `<span style="font-size:18px;">🔒</span><span>${sk ? sk.name : '???'}</span><span style="font-size:10px;color:var(--text3)">Lv${reqLv}</span>`;
      } else {
        const ready = s.player.sp >= sk.spCost && s.player.skillCd[i] === 0;
        if (ready) btn.classList.add('ready');
        if (s.player.skillCd[i] > 0) btn.classList.add('cooldown');
        btn.innerHTML = `${s.player.skillCd[i] > 0 ? `<span class="cd-text">${s.player.skillCd[i]}</span>` : ''}
          <span style="font-size:16px;">${i===0?'⚡':i===1?'💥':'🌟'}</span>
          <span>${sk.name}</span>
          <span style="font-size:10px;color:var(--sp-color)">SP:${sk.spCost}</span>`;
        btn.onclick = () => this.activateSkill(i);
      }
      el.appendChild(btn);
    }
  },

  _renderLives() {
    const el = document.getElementById('player-lives');
    const chars = Storage.getChars();
    const char = chars.find(c => c.id === this.playerCharId);
    const lives = char ? (char._battleLives !== undefined ? char._battleLives : BALANCE.lifeCount) : BALANCE.lifeCount;
    el.innerHTML = '';
    for (let i = 0; i < BALANCE.lifeCount; i++) {
      const h = document.createElement('span');
      h.className = 'heart' + (i >= lives ? ' empty' : '');
      h.textContent = '♥';
      el.appendChild(h);
    }
  },

  _showEffect(text, color, side) {
    const wrap = document.getElementById('battle-canvas-wrap');
    const W = wrap.clientWidth;
    const el = document.createElement('div');
    el.className = 'battle-effect';
    el.textContent = text;
    el.style.color = color;
    el.style.left = (side === 'left' ? Utils.rand(10, 35) : side === 'right' ? Utils.rand(55, 80) : Utils.rand(35, 55)) + '%';
    el.style.top = Utils.rand(30, 60) + '%';
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 900);
  },

  _flash(color) {
    const el = document.getElementById('flash-overlay');
    el.style.background = color;
    el.style.opacity = '0.35';
    setTimeout(() => { el.style.opacity = '0'; }, 150);
  },

  _slideAnim(who) {
    // 簡易アニメーション：再描画で表現
    let frame = 0;
    const anim = () => {
      frame++;
      const slide = who === 'player' ? Math.sin(frame * 1.2) * 8 : 0;
      const eSlide = who === 'enemy' ? Math.sin(frame * 1.2) * 8 : 0;
      this._drawBattle({ playerSlide: slide, enemySlide: eSlide });
      if (frame < 6) requestAnimationFrame(anim);
    };
    requestAnimationFrame(anim);
  },

  cycleSpeed() {
    this._speedIdx = (this._speedIdx + 1) % BALANCE.speedSteps.length;
    this._updateSpeedBtn();
    this._startLoop();
  },

  _updateSpeedBtn() {
    document.getElementById('speed-btn').textContent = '×' + BALANCE.speedSteps[this._speedIdx];
  },

  pause() {
    this._stopLoop();
    document.getElementById('pause-overlay').classList.add('active');
  },

  resume() {
    document.getElementById('pause-overlay').classList.remove('active');
    this._startLoop();
  },

  abandon() {
    this._stopLoop();
    this._winStreak = 0;
    this.isActive = false;
    document.getElementById('pause-overlay').classList.remove('active');
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('disabled'));
    // 残機リセット
    const chars = Storage.getChars();
    const char = chars.find(c => c.id === this.playerCharId);
    if (char) { char._battleLives = BALANCE.lifeCount; Storage.saveChars(chars); }
    App.showScreen('title');
  },
};

// ================================================
// SHOP
// ================================================
const Shop = {
  _tab: 'color',

  render() {
    const shopData = Storage.getShop();
    document.getElementById('shop-points').textContent = shopData.points + ' pt';
    this._renderContent();
  },

  setTab(tab) {
    this._tab = tab;
    ['color','equip','item'].forEach(t => {
      document.getElementById('shop-tab-' + t).classList.toggle('active', t === tab);
    });
    this._renderContent();
  },

  _renderContent() {
    const shopData = Storage.getShop();
    const el = document.getElementById('shop-content');
    const refreshEl = document.getElementById('shop-refresh-row');
    refreshEl.innerHTML = '';

    if (this._tab === 'color') {
      const unlocked = shopData.unlockedColors || ['white','black','red','blue'];
      const available = BALANCE.paletteColors.filter(c => !unlocked.includes(c.id));
      if (available.length === 0) {
        el.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);">全カラー入手済み！</div>';
        return;
      }
      el.innerHTML = '<div class="shop-color-grid">' + available.map(pc => `
        <div class="shop-color-item">
          <div class="shop-color-swatch" style="background:${pc.hex}"></div>
          <div class="shop-color-info">
            <div class="shop-color-name">${pc.name}</div>
            <div class="shop-color-stat">${pc.stat}</div>
            <div class="shop-color-price">${pc.price} pt</div>
          </div>
          <button class="btn btn-sm btn-accent2" onclick="Shop.buyColor('${pc.id}')">購入</button>
        </div>
      `).join('') + '</div>';

    } else if (this._tab === 'equip') {
      this._ensureEquipStock(shopData);
      const maxStock = Math.min(10, 3 + Math.floor(this._getMaxLevel() / 10));
      const stock = shopData.equipStock.filter(e => !e._forSale === false).slice(0, maxStock);
      // ショップ在庫と手持ち装備を分離（_forSaleフラグ）
      const saleStock = (shopData.saleStock || []).slice(0, maxStock);
      if (saleStock.length === 0) {
        el.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);">在庫なし<br>バトル後に更新されます</div>';
      } else {
        el.innerHTML = '<div class="shop-equip-list">' + saleStock.map((eq, i) => `
          <div class="shop-equip-item">
            <div class="shop-equip-info">
              <div class="shop-equip-name ${eq.rarity==='ultra'?'rarity-ultra':eq.rarity==='rare'?'rarity-rare':'rarity-normal'}">${eq.name}</div>
              <div class="shop-equip-effect">${eq.effect}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
              <div class="shop-equip-price">${eq.price} pt</div>
              <button class="btn btn-sm btn-accent2" onclick="Shop.buyEquip(${i})">購入</button>
            </div>
          </div>
        `).join('') + '</div>';
      }
      refreshEl.innerHTML = `<button class="btn btn-sm btn-secondary" onclick="Shop.refreshEquip()">🔄 在庫更新 (${BALANCE.shopRefreshCost}pt)</button>`;

    } else if (this._tab === 'item') {
      el.innerHTML = `
        <div class="shop-equip-list">
          <div class="shop-equip-item">
            <div class="shop-equip-info">
              <div class="shop-equip-name rarity-ultra">💎 進化の石</div>
              <div class="shop-equip-effect">Lv20のキャラを進化させる</div>
              <div style="font-size:11px;color:var(--text3);margin-top:2px;">所持: ${shopData.evolveStones || 0}個</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
              <div class="shop-equip-price">${BALANCE.evolveItemCost} pt</div>
              <button class="btn btn-sm btn-accent2" onclick="Shop.buyEvolveStone()">購入</button>
            </div>
          </div>
        </div>
      `;
    }
  },

  _getMaxLevel() {
    const chars = Storage.getChars();
    return chars.reduce((m, c) => Math.max(m, c.level), 1);
  },

  _ensureEquipStock(shopData) {
    if (!shopData.saleStock || shopData.saleStock.length === 0) {
      this._refreshSaleStock(shopData);
    }
  },

  _refreshSaleStock(shopData) {
    const count = Math.min(10, 3 + Math.floor(this._getMaxLevel() / 10));
    shopData.saleStock = [];
    for (let i = 0; i < count; i++) {
      const eq = Battle._generateEquip();
      const rnd = Math.random();
      eq.price = eq.rarity === 'ultra' ? 400 : eq.rarity === 'rare' ? 200 : 80;
      shopData.saleStock.push(eq);
    }
  },

  buyColor(colorId) {
    const shopData = Storage.getShop();
    const pc = BALANCE.paletteColors.find(c => c.id === colorId);
    if (!pc) return;
    if (shopData.points < pc.price) { App.toast('ポイントが不足しています', 'var(--accent)'); return; }
    shopData.points -= pc.price;
    if (!shopData.unlockedColors) shopData.unlockedColors = ['white','black','red','blue'];
    if (!shopData.unlockedColors.includes(colorId)) shopData.unlockedColors.push(colorId);
    Storage.saveShop(shopData);
    App.toast(`「${pc.name}」を入手！`, 'var(--accent3)');
    this.render();
  },

  buyEquip(saleIdx) {
    const shopData = Storage.getShop();
    const eq = (shopData.saleStock || [])[saleIdx];
    if (!eq) return;
    if (shopData.points < eq.price) { App.toast('ポイントが不足しています', 'var(--accent)'); return; }
    shopData.points -= eq.price;
    if (!shopData.equipStock) shopData.equipStock = [];
    shopData.equipStock.push({ ...eq });
    shopData.saleStock.splice(saleIdx, 1);
    Storage.saveShop(shopData);
    App.toast(`「${eq.name}」を入手！`, 'var(--rare-color)');
    this.render();
  },

  buyEvolveStone() {
    const shopData = Storage.getShop();
    if (shopData.points < BALANCE.evolveItemCost) { App.toast('ポイントが不足しています', 'var(--accent)'); return; }
    shopData.points -= BALANCE.evolveItemCost;
    shopData.evolveStones = (shopData.evolveStones || 0) + 1;
    Storage.saveShop(shopData);
    App.toast('進化の石を入手！', 'var(--ultra-color)');
    this.render();
  },

  refreshEquip() {
    const shopData = Storage.getShop();
    if (shopData.points < BALANCE.shopRefreshCost) { App.toast('ポイントが不足しています', 'var(--accent)'); return; }
    shopData.points -= BALANCE.shopRefreshCost;
    this._refreshSaleStock(shopData);
    Storage.saveShop(shopData);
    App.toast('在庫を更新しました');
    this.render();
  },
};

// ================================================
// RANKING
// ================================================
const Ranking = {
  render() {
    const ranking = Storage.getRanking();
    const el = document.getElementById('ranking-list');
    el.innerHTML = '';
    if (ranking.length === 0) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);">まだ記録がありません<br>バトルに勝利してランクインしよう！</div>';
    } else {
      ranking.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = 'ranking-item';
        const rankEl = document.createElement('div');
        rankEl.className = 'rank-num' + (i===0?' gold':i===1?' silver':i===2?' bronze':'');
        rankEl.textContent = i + 1;
        div.appendChild(rankEl);
        if (r.pixels) {
          const canvas = document.createElement('canvas');
          canvas.className = 'rank-dot-canvas';
          canvas.width = 32; canvas.height = 32;
          Utils.drawPixels(canvas.getContext('2d'), r.pixels, 2, 16, 16);
          div.appendChild(canvas);
        }
        const info = document.createElement('div');
        info.className = 'rank-info';
        info.innerHTML = `
          <div class="rank-name">${r.charName}</div>
          <div class="rank-score">${r.score.toLocaleString()}</div>
          <div class="rank-stats">
            <span>撃破:${r.kills}</span>
            <span>ターン:${r.turns}</span>
            <span>連勝:${r.winStreak||0}</span>
          </div>
        `;
        div.appendChild(info);
        el.appendChild(div);
      });
    }
    // パーソナルベスト
    const best = ranking.length > 0 ? ranking[0].score : null;
    document.getElementById('my-best-score').textContent = best ? best.toLocaleString() : '---';
  },
};

// ================================================
// INIT
// ================================================
window.addEventListener('DOMContentLoaded', () => {
  Editor.init();
  App.init();
  // アイドルアニメーション（タイトルのみ）
  let lastFrame = 0;
  const titleAnim = (ts) => {
    if (App.currentScreen === 'title' && ts - lastFrame > 50) {
      TitleScreen.render();
      lastFrame = ts;
    }
    requestAnimationFrame(titleAnim);
  };
  requestAnimationFrame(titleAnim);
});

// リサイズ対応
window.addEventListener('resize', () => {
  if (App.currentScreen === 'editor') Editor._calcSize(), Editor._drawGrid();
  if (Battle.isActive) Battle._initCanvas();
});
</script>
