<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Pico Dot Battler</title>
<style>
/* ===== CSS変数 ===== */
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --panel: #1e2a4a;
  --panel2: #253355;
  --accent: #e94560;
  --accent2: #f5a623;
  --accent3: #4ecdc4;
  --accent4: #a8e063;
  --text: #f0f0f0;
  --text2: #a0a8c0;
  --text3: #606880;
  --border: #2a3a5c;
  --border2: #3a4a6c;
  --tab-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --hp-color: #4ecdc4;
  --sp-color: #f5a623;
  --enemy-hp: #e94560;
  --enemy-sp: #c084fc;
  --normal-color: #a0a8c0;
  --rare-color: #4ecdc4;
  --ultra-color: #f5a623;
  --font-main: 'Courier New', monospace;
}

/* ===== リセット・基本 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-main); font-size: 16px; touch-action: manipulation; }
body { display: flex; flex-direction: column; }

/* ===== トースト通知 ===== */
#toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px);
  background: var(--panel2); border: 1px solid var(--border2); border-radius: 8px;
  padding: 10px 20px; font-size: 14px; color: var(--text); z-index: 9999;
  transition: transform 0.3s ease; pointer-events: auto; cursor: pointer;
  white-space: nowrap; max-width: 90vw; text-align: center;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ===== メインコンテンツエリア ===== */
#app {
  flex: 1; overflow: hidden; position: relative;
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom));
}

/* ===== 画面共通 ===== */
.screen {
  position: absolute; inset: 0;
  display: none; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  padding: 12px 12px 4px;
}
.screen.active { display: flex; }

/* ===== タブバー ===== */
#tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; z-index: 100;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; cursor: pointer;
  color: var(--text3); font-size: 10px; transition: color 0.2s;
  user-select: none;
}
.tab-btn .tab-icon { font-size: 20px; line-height: 1; }
.tab-btn.active { color: var(--accent); }
.tab-btn.disabled { opacity: 0.3; pointer-events: none; }

/* ===== 見出し・ボタン共通 ===== */
.screen-title {
  font-size: 20px; font-weight: bold; color: var(--accent);
  text-align: center; margin-bottom: 12px; letter-spacing: 2px;
}
.btn {
  display: flex; align-items: center; justify-content: center;
  min-height: 60px; border-radius: 8px; font-size: 16px; font-weight: bold;
  cursor: pointer; border: none; font-family: var(--font-main);
  transition: opacity 0.15s, transform 0.1s; user-select: none;
  letter-spacing: 1px;
}
.btn:active { opacity: 0.75; transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--panel2); color: var(--text); border: 1px solid var(--border2); }
.btn-accent2 { background: var(--accent2); color: #1a1a2e; }
.btn-accent3 { background: var(--accent3); color: #1a1a2e; }
.btn-sm { min-height: 44px; font-size: 14px; padding: 0 16px; }
.btn:disabled, .btn.disabled { opacity: 0.35; pointer-events: none; }

/* ===== HPバー・SPバー ===== */
.bar-wrap { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.bar-label { font-size: 11px; color: var(--text2); }
.bar-track { height: 10px; background: var(--bg3); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.3s ease; }
.bar-hp .bar-fill { background: var(--hp-color); }
.bar-sp .bar-fill { background: var(--sp-color); }
.bar-hp-enemy .bar-fill { background: var(--enemy-hp); }
.bar-sp-enemy .bar-fill { background: var(--enemy-sp); }

/* ===== タイトル画面 ===== */
#screen-title {
  align-items: center; justify-content: center; gap: 20px;
}
.title-logo {
  font-size: 28px; font-weight: bold; color: var(--accent);
  letter-spacing: 3px; text-align: center; line-height: 1.3;
  text-shadow: 0 0 20px rgba(233,69,96,0.5);
}
.title-sub { font-size: 13px; color: var(--text3); letter-spacing: 2px; }
.title-pixel-art {
  width: 80px; height: 80px; image-rendering: pixelated;
  border: 2px solid var(--border2); border-radius: 8px;
}
.title-btns { width: 100%; max-width: 280px; display: flex; flex-direction: column; gap: 12px; }

/* ===== チュートリアル ===== */
#tutorial-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 500; display: none; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px;
}
#tutorial-overlay.active { display: flex; }
.tutorial-box {
  background: var(--panel); border: 1px solid var(--border2);
  border-radius: 12px; padding: 24px; width: 100%; max-width: 320px;
  text-align: center;
}
.tutorial-step { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.tutorial-title { font-size: 20px; color: var(--accent); margin-bottom: 12px; font-weight: bold; }
.tutorial-desc { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 20px; }
.tutorial-btns { display: flex; gap: 10px; }
.tutorial-skip { position: absolute; top: 16px; right: 16px; font-size: 13px; color: var(--text3); cursor: pointer; padding: 8px; }

/* ===== エディタ画面 ===== */
#screen-editor { gap: 8px; }
.editor-name-row { display: flex; gap: 8px; align-items: center; }
.editor-name-input {
  flex: 1; background: var(--panel); border: 1px solid var(--border2);
  color: var(--text); font-family: var(--font-main); font-size: 16px;
  padding: 10px 12px; border-radius: 8px; outline: none;
}
.editor-name-input:focus { border-color: var(--accent3); }
.editor-help-btn {
  width: 44px; height: 44px; background: var(--panel2);
  border: 1px solid var(--border2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; flex-shrink: 0;
}
#editor-canvas-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  min-height: 0;
}
#editor-canvas {
  image-rendering: pixelated;
  border: 2px solid var(--border2); border-radius: 4px;
  touch-action: none; cursor: crosshair;
}
.editor-tools { display: flex; gap: 8px; }
.tool-btn {
  flex: 1; min-height: 48px; background: var(--panel2);
  border: 1px solid var(--border2); border-radius: 8px;
  font-size: 13px; color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: border-color 0.15s;
}
.tool-btn.active { border-color: var(--accent3); color: var(--accent3); }
.palette-wrap {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px;
}
.palette-label { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.palette-colors { display: flex; flex-wrap: wrap; gap: 6px; }
.palette-color {
  width: 36px; height: 36px; border-radius: 4px; cursor: pointer;
  border: 2px solid transparent; transition: border-color 0.15s, transform 0.1s;
  flex-shrink: 0;
}
.palette-color.active { border-color: #fff; transform: scale(1.15); }
.palette-color.locked { opacity: 0.3; cursor: not-allowed; position: relative; }
.editor-actions { display: flex; gap: 8px; }
.stat-preview {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px; display: flex; gap: 8px; flex-wrap: wrap;
}
.stat-chip {
  font-size: 12px; color: var(--text2);
  background: var(--bg3); padding: 4px 8px; border-radius: 4px;
}
.stat-chip span { color: var(--accent2); font-weight: bold; }

/* ===== 編成画面 ===== */
#screen-formation { gap: 10px; }
.char-list-scroll {
  display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.char-list-scroll::-webkit-scrollbar { display: none; }
.char-card {
  flex-shrink: 0; width: 80px; background: var(--panel);
  border: 2px solid var(--border2); border-radius: 8px;
  padding: 8px; display: flex; flex-direction: column; align-items: center;
  gap: 6px; cursor: pointer; transition: border-color 0.15s;
  position: relative;
}
.char-card.selected { border-color: var(--accent3); }
.char-card.favorite::after {
  content: '★'; position: absolute; top: 4px; right: 4px;
  font-size: 12px; color: var(--accent2);
}
.char-card canvas { image-rendering: pixelated; border-radius: 2px; }
.char-card-name { font-size: 11px; color: var(--text2); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
.char-card-lv { font-size: 11px; color: var(--accent3); }
.char-add-btn {
  flex-shrink: 0; width: 80px; min-height: 100px;
  background: var(--panel); border: 2px dashed var(--border2);
  border-radius: 8px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  cursor: pointer; color: var(--text3); font-size: 24px;
}
.section-title { font-size: 13px; color: var(--text3); margin-bottom: 6px; letter-spacing: 1px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-row {
  background: var(--panel); border-radius: 6px; padding: 8px 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.stat-name { font-size: 13px; color: var(--text2); }
.stat-val { font-size: 14px; color: var(--accent2); font-weight: bold; }
.equip-slots { display: flex; gap: 8px; }
.equip-slot {
  flex: 1; min-height: 64px; background: var(--panel);
  border: 1px solid var(--border2); border-radius: 8px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; cursor: pointer;
  font-size: 12px; color: var(--text3); padding: 8px;
  position: relative;
}
.equip-slot .equip-name { font-size: 11px; color: var(--text); text-align: center; }
.equip-slot .equip-rarity { font-size: 10px; }
.rarity-normal { color: var(--normal-color); }
.rarity-rare { color: var(--rare-color); }
.rarity-ultra { color: var(--ultra-color); }
.skill-tree { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.skill-node {
  background: var(--panel); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px; text-align: center;
  font-size: 11px; cursor: pointer;
}
.skill-node.unlocked { border-color: var(--accent3); color: var(--accent3); }
.skill-node.locked { opacity: 0.5; }
.sort-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.sort-btn {
  font-size: 11px; padding: 4px 10px; background: var(--panel2);
  border: 1px solid var(--border2); border-radius: 4px; cursor: pointer;
  color: var(--text2); min-height: 32px;
}
.sort-btn.active { border-color: var(--accent3); color: var(--accent3); }
.formation-actions { display: flex; gap: 8px; margin-top: 4px; }

/* ===== バトル画面 ===== */
#screen-battle {
  padding: 8px; gap: 0; overflow: hidden;
  display: flex; flex-direction: column; height: 100%;
}
.battle-info-bar {
  background: var(--panel); border-radius: 8px; padding: 8px 10px;
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.battle-hp-row {
  display: flex; gap: 8px; margin-bottom: 4px; flex-shrink: 0;
}
.battle-hp-block { flex: 1; }
.battle-hp-label { font-size: 11px; color: var(--text2); margin-bottom: 2px; display: flex; justify-content: space-between; }
.battle-sp-row { display: flex; gap: 8px; margin-bottom: 4px; flex-shrink: 0; }
.battle-meta-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px; padding: 0 4px; flex-shrink: 0;
}
.battle-lives { display: flex; gap: 4px; }
.heart { font-size: 16px; color: var(--accent); transition: opacity 0.3s; }
.heart.empty { opacity: 0.2; }
.battle-turn { font-size: 13px; color: var(--text2); }
.battle-pause-btn {
  width: 44px; height: 44px; background: var(--panel2);
  border: 1px solid var(--border2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; flex-shrink: 0;
}
.battle-speed-btn {
  min-width: 60px; height: 32px; background: var(--panel2);
  border: 1px solid var(--border2); border-radius: 6px;
  font-size: 12px; color: var(--accent2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#battle-canvas-wrap {
  flex: 1; position: relative; overflow: hidden;
  border-radius: 8px; min-height: 0;
}
#battle-canvas { width: 100%; height: 100%; display: block; }
.battle-skills {
  display: flex; gap: 8px; padding: 8px 0 4px;
  flex-shrink: 0; height: 80px;
}
.skill-btn {
  flex: 1; height: 100%; border-radius: 8px;
  background: var(--panel2); border: 1px solid var(--border2);
  color: var(--text); font-size: 12px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; transition: all 0.2s;
  position: relative; overflow: hidden; padding: 4px;
}
.skill-btn.ready { border-color: var(--accent2); box-shadow: 0 0 12px rgba(245,166,35,0.4); animation: skillPulse 1s infinite; }
.skill-btn.locked-skill { opacity: 0.25; pointer-events: none; }
.skill-btn.cooldown { opacity: 0.5; }
.skill-btn .cd-text { position: absolute; top: 4px; right: 4px; font-size: 10px; color: var(--accent); }
@keyframes skillPulse { 0%,100%{box-shadow:0 0 8px rgba(245,166,35,0.4)} 50%{box-shadow:0 0 16px rgba(245,166,35,0.7)} }
.battle-effect {
  position: absolute; pointer-events: none; z-index: 10;
  font-size: 20px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  animation: floatUp 0.8s ease-out forwards;
}
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-50px) scale(0.7)} }
.flash-overlay {
  position: absolute; inset: 0; pointer-events: none; z-index: 20;
  opacity: 0; border-radius: 8px;
}
/* バトル一時停止オーバーレイ */
#pause-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 200; display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}
#pause-overlay.active { display: flex; }
.pause-box {
  background: var(--panel); border: 1px solid var(--border2);
  border-radius: 12px; padding: 24px; width: 80%; max-width: 280px;
  text-align: center;
}
.pause-title { font-size: 20px; color: var(--accent2); margin-bottom: 16px; font-weight: bold; }
/* ステージ説明オーバーレイ */
#stage-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.75);
  z-index: 50; display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  border-radius: 8px; cursor: pointer;
}
#stage-overlay.active { display: flex; }
.stage-name { font-size: 24px; font-weight: bold; color: var(--accent2); letter-spacing: 2px; }
.stage-bonus { font-size: 14px; color: var(--accent3); }
.stage-gimmick { font-size: 13px; color: var(--text2); }
.stage-tap { font-size: 12px; color: var(--text3); margin-top: 8px; }

/* ===== リザルト画面 ===== */
#screen-result { gap: 12px; align-items: center; }
.result-title { font-size: 24px; font-weight: bold; letter-spacing: 3px; }
.result-title.win { color: var(--accent2); }
.result-title.lose { color: var(--accent); }
.result-score { font-size: 36px; font-weight: bold; color: var(--text); }
.result-score span { font-size: 16px; color: var(--text3); }
.result-stats {
  width: 100%; background: var(--panel); border-radius: 8px; padding: 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.result-stat-row { display: flex; justify-content: space-between; font-size: 14px; }
.result-stat-row .label { color: var(--text2); }
.result-stat-row .val { color: var(--accent2); font-weight: bold; }
.result-drops { width: 100%; }
.drop-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.drop-item {
  background: var(--panel); border-radius: 6px; padding: 6px 10px;
  font-size: 12px; border-left: 3px solid;
}
.result-actions { display: flex; gap: 10px; width: 100%; }

/* ===== ショップ画面 ===== */
#screen-shop { gap: 10px; }
.shop-points-bar {
  background: var(--panel); border-radius: 8px; padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.shop-points-label { font-size: 14px; color: var(--text2); }
.shop-points-val { font-size: 20px; color: var(--accent2); font-weight: bold; }
.shop-tabs { display: flex; gap: 8px; }
.shop-tab {
  flex: 1; min-height: 44px; background: var(--panel2);
  border: 1px solid var(--border2); border-radius: 8px;
  font-size: 14px; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.shop-tab.active { border-color: var(--accent3); color: var(--accent3); }
.shop-content { flex: 1; overflow-y: auto; }
.shop-color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 4px; }
.shop-color-item {
  background: var(--panel); border: 1px solid var(--border2);
  border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 10px;
}
.shop-color-swatch { width: 36px; height: 36px; border-radius: 6px; flex-shrink: 0; }
.shop-color-info { flex: 1; }
.shop-color-name { font-size: 13px; color: var(--text); margin-bottom: 2px; }
.shop-color-stat { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.shop-color-price { font-size: 13px; color: var(--accent2); font-weight: bold; }
.shop-equip-list { display: flex; flex-direction: column; gap: 8px; padding: 4px; }
.shop-equip-item {
  background: var(--panel); border: 1px solid var(--border2);
  border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 10px;
}
.shop-equip-info { flex: 1; }
.shop-equip-name { font-size: 14px; color: var(--text); margin-bottom: 2px; }
.shop-equip-effect { font-size: 12px; color: var(--text3); }
.shop-equip-price { font-size: 14px; color: var(--accent2); font-weight: bold; }
.shop-refresh-row { display: flex; justify-content: flex-end; padding: 4px; }

/* ===== ランキング画面 ===== */
#screen-ranking { gap: 10px; }
.ranking-list { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }
.ranking-item {
  background: var(--panel); border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
}
.rank-num { font-size: 20px; font-weight: bold; color: var(--text3); width: 32px; text-align: center; flex-shrink: 0; }
.rank-num.gold { color: #ffd700; }
.rank-num.silver { color: #c0c0c0; }
.rank-num.bronze { color: #cd7f32; }
.rank-dot-canvas { image-rendering: pixelated; flex-shrink: 0; border-radius: 2px; }
.rank-info { flex: 1; }
.rank-name { font-size: 14px; color: var(--text); margin-bottom: 3px; }
.rank-score { font-size: 18px; color: var(--accent2); font-weight: bold; }
.rank-stats { font-size: 11px; color: var(--text3); display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
.my-best {
  background: var(--panel); border: 1px solid var(--accent2);
  border-radius: 8px; padding: 12px; text-align: center;
}
.my-best-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }

<script>
'use strict';

// ================================================
// BALANCE CONSTANTS
// ================================================
const BALANCE = {

    skin:  { stat: null,  v: 0.3 },
    brown: { stat: 'def', v: 0.6 },

  },
  paletteColors: [
    { id: 'white',  hex: '#f0f0f0', name: '白', price: 0,   stat: 'SP回復', initial: true },
    { id: 'black',  hex: '#1a1a2e', name: '黒', price: 0,   stat: 'DEF',   initial: true },
    { id: 'red',    hex: '#e94560', name: '赤', price: 0,   stat: 'ATK',   initial: true },
    { id: 'blue',   hex: '#3a7bd5', name: '青', price: 0,   stat: 'DEF',   initial: true },
    { id: 'green',  hex: '#4ecdc4', name: '緑', price: 50,  stat: 'HP'    },
    { id: 'yellow', hex: '#f5e642', name: '黄', price: 50,  stat: 'SP回復' },
    { id: 'orange', hex: '#f5a623', name: '橙', price: 80,  stat: 'ATK'   },
    { id: 'cyan',   hex: '#00cfff', name: '水色', price: 80, stat: 'DEF'  },
    { id: 'purple', hex: '#a855f7', name: '紫', price: 120, stat: 'SPD'   },
    { id: 'pink',   hex: '#f472b6', name: 'ピンク', price: 120, stat: 'SPD' },
    { id: 'gray',   hex: '#6b7280', name: '灰', price: 30,  stat: 'バランス' },
    { id: 'skin',   hex: '#fbbf8c', name: '肌色', price: 30, stat: 'バランス' },
    { id: 'brown',  hex: '#92400e', name: '茶', price: 60,  stat: 'DEF'   },
    { id: 'gold',   hex: '#ffd700', name: '金', price: 200, stat: '全ステ' },
  ],
  stages: [
    { id: 'field',  name: '草原',  bonus: 'HP+10%',  bonusStat: 'hp',  bonusVal: 0.1, gimmick: 'なし', gimmickInterval: 0, gimmickDmg: 0, dropStat: 'hp',  bg: ['#4ecdc4','#87ceeb','#228b22'] },
    { id: 'cave',   name: '洞窟',  bonus: 'DEF+10%', bonusStat: 'def', bonusVal: 0.1, gimmick: '毎5T落石（全体5ダメ）', gimmickInterval: 5, gimmickDmg: 5, dropStat: 'def', bg: ['#2a2a3e','#4a4a6e','#1a1a2e'] },
    { id: 'castle', name: '城',    bonus: 'ATK+10%', bonusStat: 'atk', bonusVal: 0.1, gimmick: 'なし', gimmickInterval: 0, gimmickDmg: 0, dropStat: 'atk', bg: ['#6b7280','#9ca3af','#374151'] },
    { id: 'beach',  name: '海岸',  bonus: 'SPD+10%', bonusStat: 'spd', bonusVal: 0.1, gimmick: '毎3T波（SP+20%）', gimmickInterval: 3, gimmickDmg: 0, dropStat: 'spd', bg: ['#f5a623','#60a5fa','#fbbf8c'] },
    { id: 'volcano',name: '火山',  bonus: 'ATK+15%', bonusStat: 'atk', bonusVal: 0.15, gimmick: '毎4T噴火（両者5ダメ）', gimmickInterval: 4, gimmickDmg: 5, dropStat: 'sp', bg: ['#e94560','#f5a623','#1a1a2e'] },
  ],
  skillSets: {
    atk: [
      { name: '強攻撃', type: 'atk', mult: 2.5, spCost: 3, cooldown: 3 },
      { name: '連続攻撃', type: 'atk', mult: 1.2, hits: 3, spCost: 4, cooldown: 4 },

    ],
    def: [
      { name: '防御バフ', type: 'def', turns: 2, spCost: 3, cooldown: 4 },
      { name: 'カウンター', type: 'counter', spCost: 3, cooldown: 4 },
      { name: '無敵', type: 'invincible', turns: 1, spCost: 5, cooldown: 6 },
    ],
    hp: [
      { name: '回復30%', type: 'heal', rate: 0.3, spCost: 3, cooldown: 4 },
      { name: 'HP吸収', type: 'drain', mult: 1.5, spCost: 4, cooldown: 4 },
      { name: '完全回復', type: 'fullheal', spCost: 6, cooldown: 8 },
    ],
    spd: [
      { name: '先制攻撃', type: 'atk', mult: 2.0, priority: true, spCost: 3, cooldown: 3 },
      { name: '2連行動', type: 'double', spCost: 4, cooldown: 5 },
      { name: '回避バフ', type: 'evade', turns: 2, spCost: 4, cooldown: 5 },
    ],
    sp: [
      { name: 'SP全回復', type: 'spfull', spCost: 0, cooldown: 5 },
      { name: '全能力バフ', type: 'allbuff', turns: 2, spCost: 4, cooldown: 6 },
      { name: 'SP消費なし', type: 'nocost', turns: 3, spCost: 3, cooldown: 7 },
    ],
  },
};

// ================================================
// STORAGE
// ================================================
const Storage = {
  keys: { chars: 'pdb_chars', ranking: 'pdb_ranking', shop: 'pdb_shop', tutorial: 'pdb_tutorial' },
  get(key) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e) { App.showError('データ読み込みエラー: ' + e.message); return null; }
  },
  set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); return true; }
    catch(e) {
      if (e.name === 'QuotaExceededError') App.showError('保存容量が不足しています。不要なデータを削除してください。');
      else App.showError('保存エラー: ' + e.message);
      return false;
    }
  },
  getChars()    { return this.get(this.keys.chars) || []; },
  saveChars(c)  { return this.set(this.keys.chars, c); },
  getRanking()  { return this.get(this.keys.ranking) || []; },
  saveRanking(r){ return this.set(this.keys.ranking, r); },
  getShop()     {
    return this.get(this.keys.shop) || {
      points: 0, unlockedColors: ['white','black','red','blue'], equipStock: [], evolveStones: 0
    };
  },
  saveShop(s)   { return this.set(this.keys.shop, s); },
  getTutorial() { return this.get(this.keys.tutorial) || { done: false, step: 0 }; },
  saveTutorial(t){ return this.set(this.keys.tutorial, t); },
};

// ================================================
// UTILS
// ================================================
const Utils = {
  rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; },
  clamp(v, min, max) { return Math.max(min, Math.min(max, v)); },
  colorNameMap: {
    atk: '攻撃力', def: '防御力', hp: 'HP', spd: '速度', sp: 'SP回復'
  },
  // ドット絵データ(256要素 colorId配列)からステータスを計算
  calcStats(pixels) {
    const counts = {};
    for (const c of pixels) { if (c && c !== 'transparent') counts[c] = (counts[c] || 0) + 1; }
    const totalFilled = Object.values(counts).reduce((s, v) => s + v, 0);
    if (totalFilled === 0) return { atk:10, def:10, hp:50, spd:10, sp:10 };
    const baseMultiplier = (totalFilled / 256) * BALANCE.baseMultiplier;
    const stats = { atk:0, def:0, hp:0, spd:0, sp:0 };
    const kinds = Object.keys(counts).length;
    for (const [colorId, cnt] of Object.entries(counts)) {
      const cc = BALANCE.colorCoeff[colorId];
      if (!cc || !cc.stat) continue;
      stats[cc.stat] += kinds * cnt * cc.v * baseMultiplier;
    }
    for (const k of Object.keys(stats)) stats[k] = Math.max(10, Math.round(stats[k]));
    return stats;
  },
  // 最高ステータスのキーを返す
  topStat(stats) {
    const keys = ['atk','def','hp','spd','sp'];
    return keys.reduce((a, b) => stats[a] > stats[b] ? a : b);
  },
  // 自動命名
  autoName(pixels) {
    const counts = {};
    for (const c of pixels) { if (c && c !== 'transparent') counts[c] = (counts[c] || 0) + 1; }
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    const colorWord = { red:'レッド', blue:'ブルー', green:'グリーン', yellow:'イエロー',
      orange:'オレンジ', purple:'パープル', pink:'ピンク', cyan:'シアン', white:'ホワイト',
      black:'ブラック', gray:'グレー', skin:'スキン', brown:'ブラウン', gold:'ゴールド' };
    const bodyWords = ['ナイト','ドラゴン','ウィザード','ゴーレム','フォックス','スピリット','デーモン','エンジェル'];
    const c = top ? (colorWord[top[0]] || 'ミスト') : 'ミスト';
    const b = bodyWords[Math.floor(Math.random() * bodyWords.length)];
    return c + b;
  },
  // ドット絵をCanvasに描画
  drawPixels(ctx, pixels, dotSize, gridW, gridH) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    for (let i = 0; i < gridW * gridH; i++) {
      const c = pixels[i];
      if (!c || c === 'transparent') continue;
      const pc = BALANCE.paletteColors.find(p => p.id === c);
      if (!pc) continue;
      const x = (i % gridW) * dotSize;
      const y = Math.floor(i / gridW) * dotSize;
      ctx.fillStyle = pc.hex;
      ctx.fillRect(x, y, dotSize, dotSize);
    }
  },
  // スキルセットを取得
  getSkills(stats) {
    const top = this.topStat(stats);
    return BALANCE.skillSets[top] || BALANCE.skillSets.atk;
  },
  // 経験値計算
  calcExp(enemyStats, battleCount) {
    const avg = (enemyStats.atk + enemyStats.def + enemyStats.hp + enemyStats.spd) / 4;
    const coeff = battleCount <= 5 ? 1.0 : battleCount <= 15 ? 1.5 : 2.0;
    return Math.round(avg * coeff);
  },
  // レベルアップに必要な経験値
  expToLevel(lv) { return lv * 30 + 50; },
  // スコア計算
  calcScore(kills, remainHpRate, turns, winStreak) {
    if (kills === 0) return 0;
    let tBonus = 1.0;
    for (const [t, b] of BALANCE.turnBonus) { if (turns <= t) { tBonus = b; break; } }
    const streakMult = Math.min(BALANCE.winStreakMax, 1.0 + winStreak * 0.1);
    // 撃破ボーナス：HP0でも撃破数分の点数を保証
    const killBonus = kills * 10;
    return Math.round((kills * remainHpRate + killBonus) * tBonus * streakMult);
  },
};

const Tutorial = {
  steps: [
    { title: 'ドット絵を描こう', desc: '16×16のグリッドにタッチして描きます。色は下のパレットで選べます。描いたキャラが自分の戦士になります！' },
    { title: '色がステータスになる', desc: '赤→ATK（攻撃力）\n青→DEF（防御力）\n緑→HP\n紫・ピンク→SPD（速度）\n黄・白→SP回復速度\n色を塗るほど強くなります！' },
    { title: 'スキルでバトル！', desc: 'バトルは自動進行。SPゲージが満タンになったらスキルボタンをタップして発動！ステージの特性も活かそう。' },
  ],
  _step: 0,
  _context: 'main',
  show(context) {
    this._context = context;
    this._step = 0;
    this._update();
    document.getElementById('tutorial-overlay').classList.add('active');
  },
  _update() {
    const s = this.steps[this._step];
    document.getElementById('tut-step').textContent = `STEP ${this._step+1} / ${this.steps.length}`;
    document.getElementById('tut-title').textContent = s.title;
    document.getElementById('tut-desc').textContent = s.desc;
    document.getElementById('tut-prev').style.display = this._step === 0 ? 'none' : '';
    const nextBtn = document.getElementById('tut-next');
    nextBtn.textContent = this._step === this.steps.length - 1 ? '完了！' : '次へ ▶';
    // スキップボタンは最初のステップ後に表示
    document.querySelector('.tutorial-skip').style.display = this._step > 0 ? '' : 'none';
  },
  next() {
    if (this._step < this.steps.length - 1) {
      this._step++;
      this._update();
    } else {
      this._complete();
    }
  },
  prev() {
    if (this._step > 0) { this._step--; this._update(); }
  },
  skip() {
    if (this._step === 0) return;
    this._complete();
  },
  _complete() {
    document.getElementById('tutorial-overlay').classList.remove('active');
    const tut = Storage.getTutorial();
    if (!tut.done) {
      tut.done = true;
      Storage.saveTutorial(tut);
      // 初回完了100pt付与
      const shop = Storage.getShop();
      shop.points = Math.min(BALANCE.maxPoints, shop.points + 100);
      Storage.saveShop(shop);
      App.toast('チュートリアル完了！100pt獲得！', 'var(--accent2)');
    }
  },
};

// ================================================
const Editor = {
  GRID: 16,
  pixels: Array(256).fill('transparent'),
  history: [],
  tool: 'pen',
  selectedColor: 'red',
  editingId: null,
  _drawing: false,
  _canvas: null,
  _ctx: null,
  _dotSize: 20,

  init() {
    this._canvas = document.getElementById('editor-canvas');
    this._ctx = this._canvas.getContext('2d');
    this._calcSize();
    this._bindEvents();
    this.newChar();
  },

  _calcSize() {
    const wrap = document.getElementById('editor-canvas-wrap');
    const available = Math.min(wrap.clientWidth || 300, wrap.clientHeight || 320, 320);
    this._dotSize = Math.floor(available / this.GRID);
    const size = this._dotSize * this.GRID;
    this._canvas.width = size;
    this._canvas.height = size;
  },

  _bindEvents() {
    const c = this._canvas;
    const getPos = (e) => {
      const rect = c.getBoundingClientRect();
      const touch = e.touches ? e.touches[0] : e;
      const x = Math.floor((touch.clientX - rect.left) / (rect.width / this.GRID));
      const y = Math.floor((touch.clientY - rect.top) / (rect.height / this.GRID));
      return { x: Utils.clamp(x, 0, this.GRID-1), y: Utils.clamp(y, 0, this.GRID-1) };
    };
    const paint = (e) => {
      e.preventDefault();
      if (!this._drawing) return;
      const { x, y } = getPos(e);
      const idx = y * this.GRID + x;
      if (this.tool === 'eraser') {
        if (this.pixels[idx] !== 'transparent') { this.pixels[idx] = 'transparent'; this._drawGrid(); this._updatePreview(); }
      } else if (this.tool === 'pen') {
        if (this.pixels[idx] !== this.selectedColor) { this.pixels[idx] = this.selectedColor; this._drawGrid(); this._updatePreview(); }
      }
    };
    c.addEventListener('mousedown', (e) => { this._saveHistory(); this._drawing = true; paint(e); });
    c.addEventListener('mousemove', paint);
    c.addEventListener('mouseup', () => { this._drawing = false; });
    c.addEventListener('touchstart', (e) => { this._saveHistory(); this._drawing = true; paint(e); }, { passive: false });
    c.addEventListener('touchmove', paint, { passive: false });
    c.addEventListener('touchend', () => { this._drawing = false; });

    c.addEventListener('click', (e) => {
      if (this.tool === 'fill') {
        const { x, y } = getPos(e);
        this._saveHistory();
        this._fill(x, y, this.pixels[y * this.GRID + x], this.selectedColor);
        this._drawGrid(); this._updatePreview();
      }
    });
  },

  _fill(x, y, targetColor, fillColor) {
    if (targetColor === fillColor) return;
    const stack = [[x, y]];
    while (stack.length) {
      const [cx, cy] = stack.pop();
      if (cx < 0 || cy < 0 || cx >= this.GRID || cy >= this.GRID) continue;
      const idx = cy * this.GRID + cx;
      if (this.pixels[idx] !== targetColor) continue;
      this.pixels[idx] = fillColor;
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
  },

  _saveHistory() {
    this.history.push([...this.pixels]);
    if (this.history.length > 10) this.history.shift();
  },

  _drawGrid() {
    const ctx = this._ctx;
    const ds = this._dotSize;
    ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
    // 背景チェッカー
    for (let y = 0; y < this.GRID; y++) {
      for (let x = 0; x < this.GRID; x++) {
        ctx.fillStyle = (x + y) % 2 === 0 ? '#2a2a3e' : '#1e1e2e';
        ctx.fillRect(x * ds, y * ds, ds, ds);
      }
    }
    // ピクセル
    Utils.drawPixels(ctx, this.pixels, ds, this.GRID, this.GRID);
    // グリッド線
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= this.GRID; i++) {
      ctx.beginPath(); ctx.moveTo(i * ds, 0); ctx.lineTo(i * ds, this.GRID * ds); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * ds); ctx.lineTo(this.GRID * ds, i * ds); ctx.stroke();
    }
  },

  _updatePreview() {
    const stats = Utils.calcStats(this.pixels);
    const el = document.getElementById('stat-preview');
    el.innerHTML = Object.entries(stats).map(([k,v]) =>
      `<div class="stat-chip">${Utils.colorNameMap[k]||k} <span>${v}</span></div>`
    ).join('');
  },

  setTool(t) {
    this.tool = t;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    const el = document.getElementById('tool-' + t);
    if (el) el.classList.add('active');
  },

  undo() {
    if (!this.history.length) return;
    this.pixels = this.history.pop();
    this._drawGrid(); this._updatePreview();
  },

  clear() {
    if (!confirm('キャンバスをクリアしますか？')) return;
    this._saveHistory();
    this.pixels = Array(256).fill('transparent');
    this._drawGrid(); this._updatePreview();
  },

  newChar() {
    this.editingId = null;
    this.pixels = Array(256).fill('transparent');
    this.history = [];
    document.getElementById('editor-name').value = '';
    this._calcSize();
    this._drawGrid();
    this._updatePreview();
  },

  loadChar(char) {
    this.editingId = char.id;
    this.pixels = [...char.pixels];
    this.history = [];
    document.getElementById('editor-name').value = char.name;
    this._calcSize();
    this._drawGrid();
    this._updatePreview();
  },

  saveAndGo() {
    const pixels = [...this.pixels];
    const filled = pixels.filter(c => c !== 'transparent').length;
    if (filled === 0) { App.toast('何か描いてから保存してください', 'var(--accent)'); return; }
    this.saveChar();
    // 保存したキャラを編成で選択状態にする
    const chars = Storage.getChars();
    let name = document.getElementById('editor-name').value.trim();
    if (!name) name = Utils.autoName(pixels);
    const saved = this.editingId
      ? chars.find(c => c.id === this.editingId)
      : [...chars].reverse().find(c => c.name === name);
    if (saved) Formation.selectedId = saved.id;
    App.showScreen('formation');
  },

  saveChar() {
    const pixels = [...this.pixels];
    const filled = pixels.filter(c => c !== 'transparent').length;
    if (filled === 0) { App.toast('何か描いてから保存してください', 'var(--accent)'); return; }

    let name = document.getElementById('editor-name').value.trim();
    if (!name) name = Utils.autoName(pixels);

    const chars = Storage.getChars();
    const stats = Utils.calcStats(pixels);

    if (this.editingId) {
      const idx = chars.findIndex(c => c.id === this.editingId);
      if (idx >= 0) {
        chars[idx].pixels = pixels;
        chars[idx].name = name;
        chars[idx].stats = stats;
      }
    } else {
      const maxSlots = Storage.getShop().maxSlots || 5;
      if (chars.length >= maxSlots) {
        App.toast(`キャラ上限(${maxSlots}体)です。削除してから作成してください`, 'var(--accent)');
        return;
      }
      chars.push({
        id: 'c' + Date.now(),
        name, pixels, stats,
        level: 1, exp: 0,
        equip: { weapon: null, armor: null, accessory: null },
        unlockedSkills: [0],
        favorite: false,
        createdAt: Date.now(),
      });
    }
    Storage.saveChars(chars);
    App.toast('保存しました：' + name, 'var(--accent3)');
    this.editingId = null;
  },

  refresh() {
    this._calcSize();
    this._drawGrid();
    this._updatePreview();
    this._renderPalette();
  },

  _renderPalette() {
    const shop = Storage.getShop();
    const unlocked = shop.unlockedColors || ['white','black','red','blue'];
    const el = document.getElementById('palette-colors');
    el.innerHTML = '';
    for (const pc of BALANCE.paletteColors) {
      const div = document.createElement('div');
      div.className = 'palette-color' + (unlocked.includes(pc.id) ? '' : ' locked');
      if (this.selectedColor === pc.id) div.classList.add('active');
      div.style.background = pc.hex;
      div.title = pc.name;
      if (unlocked.includes(pc.id)) {
        div.onclick = () => { this.selectedColor = pc.id; this._renderPalette(); };
      } else {
        div.onclick = () => App.toast(`「${pc.name}」はショップで購入できます`, 'var(--panel2)');
      }
      el.appendChild(div);
    }
  },
};

const Formation = {
  selectedId: null,
  sortMode: 'name_asc',

  render() {
    const chars = this._getSorted();
    const listEl = document.getElementById('char-list');
    listEl.innerHTML = '';
    for (const char of chars) {
      const div = document.createElement('div');
      div.className = 'char-card' + (char.id === this.selectedId ? ' selected' : '') + (char.favorite ? ' favorite' : '');
      const canvas = document.createElement('canvas');
      canvas.width = 48; canvas.height = 48;
      Utils.drawPixels(canvas.getContext('2d'), char.pixels, 3, 16, 16);
      const name = document.createElement('div');
      name.className = 'char-card-name'; name.textContent = char.name;
      const lv = document.createElement('div');
      lv.className = 'char-card-lv'; lv.textContent = 'LV.' + char.level;
      div.appendChild(canvas); div.appendChild(name); div.appendChild(lv);
      div.onclick = () => this.select(char.id);
      div.oncontextmenu = (e) => { e.preventDefault(); this.select(char.id); };
      listEl.appendChild(div);
    }
    // 追加ボタン
    const add = document.createElement('div');
    add.className = 'char-add-btn';
    add.innerHTML = '<span>＋</span><span style="font-size:11px;color:var(--text3);">新規作成</span>';
    add.onclick = () => { Editor.newChar(); App.showScreen('editor'); };
    listEl.appendChild(add);

    if (this.selectedId) this._renderDetail();
    else document.getElementById('formation-detail').style.display = 'none';

    // 出撃タブ状態更新
    App._updateBattleTab();
  },

  _getSorted() {
    let chars = [...Storage.getChars()];
    switch (this.sortMode) {
      case 'name_asc':    return chars.sort((a,b) => a.name.localeCompare(b.name));
      case 'name_desc':   return chars.sort((a,b) => b.name.localeCompare(a.name));
      case 'level_desc':  return chars.sort((a,b) => b.level - a.level);
      case 'created_desc':return chars.sort((a,b) => b.createdAt - a.createdAt);
      case 'fav':         return chars.sort((a,b) => (b.favorite?1:0) - (a.favorite?1:0));
      default: return chars;
    }
  },

  setSort(mode) {
    this.sortMode = mode;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === mode));
    this.render();
  },

  select(id) {
    this.selectedId = id;
    this.render();
  },

  getSelected() {
    return Storage.getChars().find(c => c.id === this.selectedId) || null;
  },

  _renderDetail() {
    const char = this.getSelected();
    if (!char) return;
    const detail = document.getElementById('formation-detail');
    detail.style.display = 'flex';

    // Stats
    const statsEl = document.getElementById('formation-stats');
    const names = { atk:'ATK', def:'DEF', hp:'HP', spd:'SPD', sp:'SP回復' };
    statsEl.innerHTML = Object.entries(char.stats).map(([k,v]) =>
      `<div class="stat-row"><span class="stat-name">${names[k]||k}</span><span class="stat-val">${v}</span></div>`
    ).join('');

    // Equip
    const equipEl = document.getElementById('equip-slots');
    const slots = [
      { key:'weapon', label:'⚔ 武器' },
      { key:'armor',  label:'🛡 防具' },
      { key:'accessory', label:'💍 装飾' },
    ];
    equipEl.innerHTML = slots.map(s => {
      const eq = char.equip[s.key];
      const emptyStyle = 'opacity:0.4;';
      return `<div class="equip-slot" onclick="Formation.openEquipModal('${s.key}')">
        <div style="font-size:20px;${eq ? '' : emptyStyle}">${s.label.split(' ')[0]}</div>
        ${eq ? `<div class="equip-name ${eq.rarity === 'ultra' ? 'rarity-ultra' : eq.rarity === 'rare' ? 'rarity-rare' : 'rarity-normal'}">${eq.name}</div>
          <div style="font-size:10px;color:var(--text3)">${eq.effect}</div>`
          : `<div style="font-size:11px;${emptyStyle}color:var(--text3);">${s.label.split(' ')[1]}</div>`}
      </div>`;
    }).join('');

    // Skill tree
    const skillEl = document.getElementById('skill-tree');
    const skills = Utils.getSkills(char.stats);
    skillEl.innerHTML = skills.map((sk, i) => {
      const reqLv = BALANCE.skillUnlockLv[i];
      const unlocked = char.level >= reqLv;
      return `<div class="skill-node ${unlocked ? 'unlocked' : 'locked'}">
        <div style="font-size:16px;">${i===0?'⚡':i===1?'💥':'🌟'}</div>
        <div>${sk.name}</div>
        ${!unlocked ? `<div style="font-size:10px;color:var(--text3)">Lv${reqLv}で解放</div>` : '<div style="font-size:10px;color:var(--accent3)">解放済</div>'}
      </div>`;
    }).join('');
  },

  openEquipModal(slotKey) {
    const char = this.getSelected();
    if (!char) return;
    const modal = document.getElementById('equip-modal');
    const content = document.getElementById('equip-modal-content');
    const shopData = Storage.getShop();
    const available = (shopData.equipStock || []).filter(e => e.slot === slotKey);
    const current = char.equip[slotKey];

    content.innerHTML = `
      <div class="equip-modal-title">${slotKey === 'weapon' ? '⚔ 武器' : slotKey === 'armor' ? '🛡 防具' : '💍 装飾'} スロット</div>
      ${current ? `<div class="equip-modal-effect">装備中: <span class="rarity-${current.rarity}">${current.name}</span> / ${current.effect}</div>` : '<div class="equip-modal-effect">未装備</div>'}
      <div style="display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;margin-bottom:12px;">
        ${available.length === 0 ? '<div style="font-size:13px;color:var(--text3);text-align:center;padding:16px;">装備可能なアイテムがありません<br>ショップで入手してください</div>' :
          available.map((eq, i) => {
            const diff = current ? this._calcEquipDiff(current, eq) : null;
            return `<div style="background:var(--bg3);border-radius:8px;padding:10px;cursor:pointer;" onclick="Formation.equipItem('${slotKey}', ${i})">
              <div class="${eq.rarity === 'ultra' ? 'rarity-ultra' : eq.rarity === 'rare' ? 'rarity-rare' : 'rarity-normal'}" style="font-weight:bold;">${eq.name}</div>
              <div style="font-size:12px;color:var(--text3);">${eq.effect}</div>
              ${diff ? `<div style="font-size:11px;margin-top:4px;">${Object.entries(diff).map(([k,v]) => `<span class="${v>0?'equip-diff-pos':'equip-diff-neg'}">${k}:${v>0?'+':''}${v}</span>`).join(' ')}</div>` : ''}
            </div>`;
          }).join('')}
      </div>
      ${current ? `<button class="btn btn-secondary" onclick="Formation.unequipItem('${slotKey}')">外す</button>` : ''}
      <div style="height:8px;"></div>
      <button class="btn btn-secondary" onclick="document.getElementById('equip-modal').classList.remove('active')">閉じる</button>
    `;
    modal.classList.add('active');
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
  },

  _calcEquipDiff(current, next) {
    // 簡易差分（効果文字列から数値抽出）
    return {};
  },

  equipItem(slotKey, stockIdx) {
    const chars = Storage.getChars();
    const char = chars.find(c => c.id === this.selectedId);
    if (!char) return;
    const shopData = Storage.getShop();
    const available = (shopData.equipStock || []).filter(e => e.slot === slotKey);
    if (!available[stockIdx]) return;

    // 装備中のものをストックに戻す
    if (char.equip[slotKey]) {
      shopData.equipStock.push(char.equip[slotKey]);
    }
    char.equip[slotKey] = available[stockIdx];
    // ストックから削除
    const globalIdx = shopData.equipStock.findIndex(e => e === available[stockIdx]);
    if (globalIdx >= 0) shopData.equipStock.splice(globalIdx, 1);

    Storage.saveChars(chars);
    Storage.saveShop(shopData);
    document.getElementById('equip-modal').classList.remove('active');
    this.render();
    App.toast('装備しました', 'var(--accent3)');
  },

  unequipItem(slotKey) {
    const chars = Storage.getChars();
    const char = chars.find(c => c.id === this.selectedId);
    if (!char || !char.equip[slotKey]) return;
    const shopData = Storage.getShop();
    shopData.equipStock.push(char.equip[slotKey]);
    char.equip[slotKey] = null;
    Storage.saveChars(chars);
    Storage.saveShop(shopData);
    document.getElementById('equip-modal').classList.remove('active');
    this.render();
    App.toast('外しました');
  },

  editChar() {
    const char = this.getSelected();
    if (!char) { App.toast('キャラを選択してください', 'var(--accent)'); return; }
    Editor.loadChar(char);
    App.showScreen('editor');
  },

  duplicateChar() {
    const char = this.getSelected();
    if (!char) return;
    const chars = Storage.getChars();
    const maxSlots = Storage.getShop().maxSlots || 5;
    if (chars.length >= maxSlots) { App.toast('キャラ上限です', 'var(--accent)'); return; }
    const copy = {
      ...char,
      id: 'c' + Date.now(),
      name: char.name + '(複製)',
      level: 1, exp: 0,
      equip: { weapon: null, armor: null, accessory: null },
      unlockedSkills: [0],
      favorite: false,
      createdAt: Date.now(),
    };
    chars.push(copy);
    Storage.saveChars(chars);
    App.toast('複製しました', 'var(--accent3)');
    this.render();
  },

  toggleFavorite() {
    const chars = Storage.getChars();
    const char = chars.find(c => c.id === this.selectedId);
    if (!char) return;
    char.favorite = !char.favorite;
    Storage.saveChars(chars);
    App.toast(char.favorite ? '★お気に入りに追加' : 'お気に入りを解除');
    this.render();
  },

  deleteChar() {
    const chars = Storage.getChars();
    const char = chars.find(c => c.id === this.selectedId);
    if (!char) { App.toast('キャラを選択してください', 'var(--accent)'); return; }
    if (char.favorite) { App.toast('お気に入りのキャラは削除できません', 'var(--accent)'); return; }
    if (chars.length <= 1) { App.toast('最後のキャラは削除できません', 'var(--accent)'); return; }
    if (Battle.isActive && Battle.playerCharId === this.selectedId) {
      App.toast('出撃中のキャラは削除できません', 'var(--accent)'); return;
    }
    // 削除確認ダイアログ
    Formation._pendingDelete = this.selectedId;
    App._showConfirm(`「${char.name}」を削除しますか？`, () => {
      const cs = Storage.getChars();
      const target = cs.find(c => c.id === Formation._pendingDelete);
      if (!target) return;
      cs.splice(cs.indexOf(target), 1);
      Storage.saveChars(cs);
      Formation.selectedId = null;
      App.toast('削除しました');
      Formation.render();
    });
  },
};

const Audio = {
  _ctx: null,
  _get() {
    if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    return this._ctx;
  },
  _beep(freq, duration, type = 'square', volume = 0.15) {
    try {
      const ctx = this._get();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  },
  _sweep(f1, f2, duration) {
    try {
      const ctx = this._get();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square'; osc.frequency.setValueAtTime(f1, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(f2, ctx.currentTime + duration);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  },
  play(type) {
    switch(type) {
      case 'attack':  this._beep(220, 0.1); break;
      case 'skill':   this._sweep(220, 440, 0.3); break;
      case 'damage':  this._beep(110, 0.1); break;
      case 'victory': [440,550,660].forEach((f,i) => setTimeout(()=>this._beep(f,0.15),i*150)); break;
      case 'defeat':  [330,220,110].forEach((f,i) => setTimeout(()=>this._beep(f,0.2),i*200)); break;
      case 'levelup': [440,550,660,880].forEach((f,i) => setTimeout(()=>this._beep(f,0.12),i*100)); break;
    }
  },
  // BGMフック（将来実装）
  bgmStart() {},
  bgmStop() {},
};
